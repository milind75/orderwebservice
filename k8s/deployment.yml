apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderwebservice
  labels:
    app: orderwebservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orderwebservice
  template:
    metadata:
      labels:
        app: orderwebservice
    spec:
      containers:
        - name: orderwebservice
          image: 014848113228.dkr.ecr.us-east-1.amazonaws.com/orderwebservice/ordercreation:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
