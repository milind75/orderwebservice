name: CI/CD Pipeline - Build & Push to AWS ECR

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  IMAGE_NAME: milind75/orderwebservice
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "014848113228"
  ECR_REPOSITORY: orderwebservice
  ECR_REGISTRY: 014848113228.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: my-eks

jobs:
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Grant Gradle Execute Permission
        run: chmod +x gradlew

      - name: 🔨 Build with Gradle
        run: ./gradlew bootJar --no-daemon

      - name: 🧪 Run Tests
        run: ./gradlew test --no-daemon

      - name: 📦 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  push-to-ecr:
    name: 🐳 Build & Push Docker Image to AWS ECR
    runs-on: ubuntu-latest
    needs: build-and-test  # only runs if build-and-test passes
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    outputs:
      image-tag: ${{ steps.image-tag.outputs.TAG }}

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: ⬇️ Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏷️ Set Image Tag
        id: image-tag
        run: echo "TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: 🐳 Build Docker Image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.image-tag.outputs.TAG }} .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.image-tag.outputs.TAG }} \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: 🚀 Push Docker Image to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.image-tag.outputs.TAG }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: 📋 Print Image URI
        run: |
          echo "✅ Image pushed to:"
          echo "$ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.image-tag.outputs.TAG }}"
          echo "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
  deploy-to-eks:
    name: 🚀 Deploy to EKS
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ⚙️ Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: 🔗 Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: 🖼️ Update Image Tag in Deployment
        run: |
          sed -i 's|:latest|:${{ needs.push-to-ecr.outputs.image-tag }}|g' k8s/deployment.yml

      - name: 📦 Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml

      - name: ⏳ Wait for Rollout to Complete
        run: |
          kubectl rollout status deployment/orderwebservice --timeout=120s

      - name: 🌐 Get LoadBalancer URL
        run: |
          echo "✅ Service deployed at:"
          kubectl get service orderwebservice \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'